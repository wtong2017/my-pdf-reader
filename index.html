<body>
    <div id="viewerContainer">
        <div id="viewer" class="pdfViewer"></div>
    </div>
    <label for="inputElement">Select a PDF file:</label>
    <input type="file" id="inputElement" name="inputElement">
    <!-- <div id="my_pdf_viewer">

        </div>
    </div> -->
    <div id="navigation_controls">
        <button id="go_previous">Previous</button>
        <input id="current_page" value="1" type="number" />
        <button id="go_next">Next</button>
    </div>
    <div id="zoom_controls">
        <button id="zoom_in">+</button>
        <button id="zoom_out">-</button>
    </div>
</body>
<script>
    var myState = {
        pdf: null,
        currentPage: 1,
        zoom: 1
    }

    var inputElement = document.getElementById("inputElement")
    inputElement.onchange = function (event) {

        var file = event.target.files[0];

        //Step 2: Read the file using file reader
        var fileReader = new FileReader();

        fileReader.onload = function () {

            //Step 4:turn array buffer into typed array
            var typedarray = new Uint8Array(this.result);

            //Step 5:PDFJS should be able to read this
            var loadingTask = pdfjsLib.getDocument(typedarray);
            loadingTask.promise.then(function (pdf) {
                // you can now use *pdf* here
                myState.pdf = pdf;
                render();
            });
        };
        //Step 3:Read the file as ArrayBuffer
        fileReader.readAsArrayBuffer(file);
    }

    document.getElementById('go_previous')
        .addEventListener('click', (e) => {
            if (myState.pdf == null
                || myState.currentPage == 1) return;
            myState.currentPage -= 1;
            document.getElementById("current_page")
                .value = myState.currentPage;
            render();
        });

    document.getElementById('go_next')
        .addEventListener('click', (e) => {
            if (myState.pdf == null
                || myState.currentPage > myState.pdf
                    ._pdfInfo.numPages)
                return;

            myState.currentPage += 1;
            document.getElementById("current_page")
                .value = myState.currentPage;
            render();
        });

    document.getElementById('current_page')
        .addEventListener('keypress', (e) => {
            if (myState.pdf == null) return;

            // Get key code
            var code = (e.keyCode ? e.keyCode : e.which);

            // If key code matches that of the Enter key
            if (code == 13) {
                var desiredPage =
                    document.getElementById('current_page')
                        .valueAsNumber;

                if (desiredPage >= 1
                    && desiredPage <= myState.pdf
                        ._pdfInfo.numPages) {
                    myState.currentPage = desiredPage;
                    document.getElementById("current_page")
                        .value = desiredPage;
                    render();
                }
            }
        });

    document.getElementById('zoom_in')
        .addEventListener('click', (e) => {
            if (myState.pdf == null) return;
            myState.zoom += 0.5;
            render();
        });

    document.getElementById('zoom_out')
        .addEventListener('click', (e) => {
            if (myState.pdf == null) return;
            myState.zoom -= 0.5;
            render();
        });


    var container = document.getElementById("viewerContainer");
    var eventBus = new pdfjsViewer.EventBus();
    var pdfLinkService = new pdfjsViewer.PDFLinkService({
        eventBus: eventBus,
    });

    var pdfSinglePageViewer = new pdfjsViewer.PDFSinglePageViewer({
        container: container,
        eventBus: eventBus,
        linkService: pdfLinkService,
    });
    pdfLinkService.setViewer(pdfSinglePageViewer);

    eventBus.on("pagesinit", function () {
        // We can use pdfSinglePageViewer now, e.g. let's change default scale.
        pdfSinglePageViewer.currentScaleValue = "page-width";
    });

    function render() {
        pdfSinglePageViewer.setDocument(myState.pdf);
        pdfLinkService.setDocument(myState.pdf, null);
