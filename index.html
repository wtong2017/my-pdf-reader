<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My PDF Viewer</title>

    <style>
        #topMenu {
            height: 3%;
            background-color: #F7F7F7;
        }

        body {
            background-color: #808080;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
        }

        #viewerContainer {
            overflow: auto;
            position: absolute;
            width: 100%;
            height: 97%;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.5.207/web/pdf_viewer.css">
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.5.207/build/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.5.207/web/pdf_viewer.js"></script>
</head>

<body>
    <div id="topMenu">
        <div style="padding: 5px;">
            <label for="inputElement">Select a PDF file:</label>
            <input type="file" id="inputElement" name="inputElement">
            <button id="back" onclick="goBack()">Go back</button>
        </div>
    </div>
    <div id="viewerContainer">
        <div id="viewer" class="pdfViewer"></div>
    </div>
</body>
<script>
    var myState = {
        pdf: null,
        currentPage: 1,
        zoom: 1
    }

    let lastPosition = null

    var SEARCH_FOR = ""

    var CMAP_URL = "https://cdn.jsdelivr.net/npm/pdfjs-dist@2.5.207/cmaps/";
    var CMAP_PACKED = true;

    var inputElement = document.getElementById("inputElement")
    inputElement.onchange = function (event) {

        var file = event.target.files[0];

        //Step 2: Read the file using file reader
        var fileReader = new FileReader();

        fileReader.onload = function () {

            //Step 4:turn array buffer into typed array
            var typedarray = new Uint8Array(this.result);

            //Step 5:PDFJS should be able to read this
            var loadingTask = pdfjsLib.getDocument({
                data: typedarray,
                cMapUrl: CMAP_URL,
                cMapPacked: CMAP_PACKED
            });
            loadingTask.promise.then(function (pdf) {
                // you can now use *pdf* here
                myState.pdf = pdf;
                pdfViewer.setDocument(myState.pdf);
                pdfLinkService.setDocument(myState.pdf, null);
                render();
            });
        };
        //Step 3:Read the file as ArrayBuffer
        fileReader.readAsArrayBuffer(file);
    }

    var container = document.getElementById("viewerContainer");
    var eventBus = new pdfjsViewer.EventBus();
    var pdfLinkService = new pdfjsViewer.PDFLinkService({
        eventBus: eventBus,
        externalLinkTarget: 2 // new tab
    });
    var pdfFindController = new pdfjsViewer.PDFFindController({
        eventBus: eventBus,
        linkService: pdfLinkService,
    });

    var pdfViewer = new pdfjsViewer.PDFViewer({
        container: container,
        eventBus: eventBus,
        linkService: pdfLinkService,
        findController: pdfFindController,
    });
    pdfLinkService.setViewer(pdfViewer);

    eventBus.on("pagesinit", function () {
        // We can use pdfViewer now, e.g. let's change default scale.
        pdfViewer.currentScaleValue = "page-width";

        if (SEARCH_FOR) {
            pdfFindController.executeCommand("find", { query: SEARCH_FOR });
        }
    });

    function render() {

    }

    function goBack() {
        if (lastPosition) {
            lastPosition.scrollIntoView()
            lastPosition = null
        }
    }

    document.addEventListener('click', function (event) {
        if (event.target.tagName == 'A' && event.target.className == "internalLink") {
            lastPosition = event.target
        }
    }, false);
</script>

</html>
